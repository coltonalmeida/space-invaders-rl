# DQN on ALE/Asteroids-v5 — SB3 Atari defaults
algo: dqn
env_id: ALE/Asteroids-v5
seed: 42
total_timesteps: 1_000_000  # validate the loop at 1M, then scale to 10M

n_envs: 1
frame_stack: 4

policy: CnnPolicy
hyperparams:
  buffer_size: 100_000
  learning_starts: 100_000
  target_update_interval: 1000
  train_freq: 4
  gamma: 0.99
  exploration_fraction: 0.1
  learning_rate: 1.0e-4

eval:
  freq: 50_000
  episodes: 5
checkpoint_freq: 100_000

wandb:
  project: asteroids-rl
  enabled: true
