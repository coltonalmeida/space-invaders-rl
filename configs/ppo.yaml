# PPO on ALE/SpaceInvaders-v5 — SB3 Atari defaults
algo: ppo
env_id: ALE/SpaceInvaders-v5
seed: 42
total_timesteps: 10_000_000  # full run (validate the loop at 1M via CLI override first)

n_envs: 8
frame_stack: 4

resume_from: null  # path to a checkpoint .zip to continue an interrupted run; null = fresh start

policy: CnnPolicy
hyperparams:
  n_steps: 128
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  learning_rate: 2.5e-4   # linearly decayed in train.py
  clip_range: 0.1
  ent_coef: 0.01
  vf_coef: 0.5

eval:
  freq: 50_000        # per-env steps between eval runs
  episodes: 5
checkpoint_freq: 25_000   # policy-steps; ×n_envs(8) = a checkpoint every 200k env-steps (~50 over 10M) for the learning timelapse

wandb:
  project: atari-rl
  enabled: true
